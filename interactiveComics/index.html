<html>
<head>
    <meta name="viewport" content="width=device-width,initial-scale=0.7,maximum-scale=1,user-scalable=no"/>
    <meta charset="UTF-8" />
    <title>Comics</title>
    <link rel="icon" href="/logo.png">

    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>

    <script src="/interactiveComics/startDate.js"></script>

    <style>
        #replace {
            width: calc(100vw - 20px);
            max-width: 750px;
        }
        #loading {
            position: absolute;
            top: 30;
            right: 30;
            width: 100px;
            display: none;
        }
    </style>

    <script>
        var shouldCheckLeft;
        var shouldCheckRight;
        var obj = new Object();
    </script>
</head>

<body>
    <label for="comicDate">Date: (<a href="#" id="today">Today</a>)</label>
    <br>
    <input type="date" id="comicDate">
    <br><br>
    <label for="comicStrip">Comic:<br>
        (<a href="#" id="bignate">BN</a>
        <a href="#" id="garfield"">GA</a>
        <a href="#" id="calvinandhobbes"">CH</a><a style="display: none" href="#" id="foxtrot"">FT</a>)
    </label>
    <br>
    <input id="comicStrip">
    <script src="/interactiveComics/hoverEvents.js"></script>
    <br><br>
    <input type="checkbox" id="showLoading" checked>
    <label for="showLoading"> Show loading circle</label>
    <br><br>
    <button id="back"><</button>
    <button id="submitDate">Submit</button>
    <button id="forward">></button>

    <img id="loading" src="/icons/loading_icon.gif"></img>
    <br><br>
    <img id="replace" src=""></img>

    <script>
        $(document).ready(function() {
            /*
            * https://stackoverflow.com/questions/5775469/whats-the-valid-way-to-include-an-image-with-no-src#comment39385494_14115340
            */
            var blankImg = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=';
            document.getElementById('replace').src = blankImg;
        });
        Date.prototype.addDays = function(days) {
            var date = new Date(this.valueOf());
            date.setDate(date.getDate() + days);
            return date;
        }

        var proxy = "https://salty-citadel-44916.herokuapp.com/";
        // var proxy = 'https://secret-retreat-45871.herokuapp.com/'
        // var proxy = "https://circumvent-cors.herokuapp.com/";
        var theURL = "https://www.gocomics.com/";
        function showStrip(stripName, stripDate) {
            var loadingImage = document.getElementById('loading');
            // var s = 'sussy';
            // obj[s] = arr;
            // document.getElementById('replace').src = "/icons/loading_icon.gif";
            // document.getElementById('replace').src = document.getElementById('replace').src;
            if (obj.hasOwnProperty(stripName + stripDate)) {
                document.getElementById('replace').src = obj[stripName + stripDate];
                console.log('cached');
                loadingImage.style.display = "none";
            } else {
                if (document.getElementById('showLoading').checked) {
                    loadingImage.style.display = "block";
                }
                $.get(proxy + theURL + stripName + "/" + stripDate, function (data) {
                    //console.log(data);
                    var parser = new DOMParser();
                    var doc = parser.parseFromString(data, "text/html");
                    var imageURL = doc.querySelector(".item-comic-image img");
                    document.getElementById('replace').src = imageURL.getAttribute('src');
                    loadingImage.style.display = "none";
                    //console.log(imageURL.getAttribute('src'));

                    obj[stripName + stripDate] = imageURL.getAttribute('src');
                    console.log(obj);
                });
            }
        }
        //showStrip('garfield', '2012/12/14');

        var dateField = document.getElementById('comicDate');
        var comicStripField = document.getElementById('comicStrip');
        var dateSubmitBtn = document.getElementById('submitDate');
        dateSubmitBtn.addEventListener("click", function () {
            var dateOutput = dateField.value.replace(/-/g, '/');
            var stripOutput = comicStripField.value;

            stripOutput = stripOutput.toLowerCase().replace(/ /g, '');
            comicStripField.value = stripOutput;

            var yourDate = new Date();
            var offset = yourDate.getTimezoneOffset();
            yourDate = new Date(yourDate.getTime() - (offset*60*1000));
            var now = yourDate.toISOString().split('T')[0];

            var comicNow = new Date(dateOutput).toISOString().split('T')[0];
            if (comicNow == now) {
                document.getElementById('forward').style.display = "none";
                shouldCheckLeft = true;
                shouldCheckRight = false;
                document.onkeydown = checkKey;
            } else if (comicNow != now) {
                document.getElementById('forward').style.display = "inline";
                shouldCheckLeft = true;
                shouldCheckRight = true;
                document.onkeydown = checkKey;
            }

            if (startDates[comicStripField.value][0] == comicNow) {
                document.getElementById('back').style.display = "none";
                shouldCheckLeft = false;
                shouldCheckRight = true;
                document.onkeydown = checkKey;
            } else if (comicNow != now) {
                document.getElementById('back').style.display = "inline";
                shouldCheckLeft = true;
                shouldCheckRight = true;
                document.onkeydown = checkKey;
            }

            showStrip(stripOutput, dateOutput);
        });

        function shiftADay(amount) {
            var stripDateObj = new Date(dateField.value);
            dateField.value = stripDateObj.addDays(amount).toISOString().split('T')[0];
            $(dateSubmitBtn).trigger('click');
        }
        var backBtn = document.getElementById('back');
        backBtn.addEventListener("click", function () {
            shiftADay(-1);
        });
        var forwardBtn = document.getElementById('forward');
        forwardBtn.addEventListener("click", function () {
            shiftADay(1);
        });

        function checkKey(e) {
            e = e || window.event;
            if (shouldCheckLeft) {
                if (e.keyCode == '37') {
                    // left arrow
                    shiftADay(-1);
                }
            }
            if (shouldCheckRight) {
                if (e.keyCode == '39') {
                    // right arrow
                    shiftADay(1);
                }
            }
        }
    </script>
</body>
</html>
