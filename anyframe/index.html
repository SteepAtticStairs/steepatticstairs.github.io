<!DOCTYPE html>
<html>
<head>
    <style>
        
    </style>
</head>
<body>
        
    <p><form>
        <label for="theurl">URL to iFrame:</label><br>
        <input type="text" id="theurl" name="theurl"><br>
        <input type="submit" value="Ok">
    </form></p>

    <p><iframe 
        style="width:800px;height:250px;border:0;overflow:hidden;" 
        scrolling="no" src="https://steepatticstairs.github.io/anyframe/blackimage.jpg">
    </iframe></p>

    <script type="text/javascript">
        // Listen for the "submit" event on the form
        document.querySelector('form').addEventListener('submit', event => {

        // Stop the form from refreshing the page
        event.preventDefault() 

        // Get the YouTube URL from the input
        const youtubeUrl = document.querySelector('[name="theurl"]').value

        // Set the "src" attribute on the iframe using the YouTube URL
        document.querySelector('iframe').setAttribute('src', youtubeUrl)
})
    </script>
</body>
</html>
