    function registerControlPosition(map, positionName) {
        if (map._controlPositions[positionName]) {
            return;
        }
        var positionContainer = document.createElement('div');
        positionContainer.className = `mapboxgl-ctrl-${positionName}`;
        map._controlContainer.appendChild(positionContainer);
        map._controlPositions[positionName] = positionContainer;
    }

        var alertArr = [];
        var sourceArr = [];
        function showAlerts() {
            $.getJSON('https://api.weather.gov/alerts/active', function(data) {
                for (let n = 0; n < data.features.length; n++) {
                    if (data.features[n].geometry != null) {
                        //L.marker([alertLat, alertLon], {icon: yellowMarkerIcon}).addTo(alertLayerGroup)
                        //    .bindPopup(alertPopup);
                        var allCoordinates = data.features[n].geometry.coordinates[0];
                        var coordinateArray = [];

                        for (let x = 0; x < Object.keys(allCoordinates).length; x++) {
                            coordinateArray.push(allCoordinates[x]);
                        }
                        var properties = data.features[n].properties
                        var geojson = {
                            "type": "Feature",
                            "geometry": {
                                "type": "Polygon",
                                "coordinates": [
                                    coordinateArray
                                ]
                            },
                            properties
                        }
                        console.log(geojson)

                        map.addSource(`alert${n}`, {
                            'type': 'geojson',
                            'data': geojson
                        });
                        sourceArr.push(`alert${n}`);
                        // Add a new layer to visualize the polygon.
                        map.addLayer({
                            'id': `alert${n}`,
                            'type': 'fill',
                            'source': `alert${n}`, // reference the data source
                            'layout': {},
                            'paint': {
                                'fill-color': '#0080ff', // blue color fill
                                'fill-opacity': 0.5
                            }
                        });
                        alertArr.push(`alert${n}`);
                        // Add a black outline around the polygon.
                        map.addLayer({
                            'id': `outline${n}`,
                            'type': 'line',
                            'source': `alert${n}`,
                            'layout': {},
                            'paint': {
                                'line-color': '#014385',
                                'line-width': 3
                            }
                        });
                        alertArr.push(`outline${n}`);
                        map.on('click', `alert${n}`, (e) => {
                            var alertEvent = e.features[0].properties.event;
                            var alertSenderName = e.features[0].properties.senderName;
                            var alertHeadline = e.features[0].properties.headline;
                            var alertDescription = e.features[0].properties.description;
                            var alertInstruction = e.features[0].properties.instruction;

                            var alertID = e.features[0].id;
                            var alertWMOidenifier = e.features[0].properties.parameters.WMOidentifier;
                            var alertVTEC = e.features[0].properties.parameters.VTEC;
                            var alertNWSheadline = "No headline for this alert."

                            if (alertInstruction == null) {
                                alertInstruction = "No instruction for this alert."
                            }

                            if (e.features[0].properties.parameters.hasOwnProperty('NWSheadline')) {
                                alertNWSheadline = e.features[0].properties.parameters.NWSheadline;
                            }

                            var alertSeverity = e.features[0].properties.severity;
                            var alertUrgency = e.features[0].properties.urgency;

                            var alertSentTime = new Date(e.features[0].properties.sent);
                            var alertEffectiveTime = new Date(e.features[0].properties.effective);
                            var alertOnsetTime = new Date(e.features[0].properties.onset);
                            var alertExpiresTime = new Date(e.features[0].properties.expires);
                            var alertEndsTime = new Date(e.features[0].properties.ends);
                            var alertPopupContent = `
                            <div style="overflow-y: scroll; height: 150px;">
                                <div class='ughh' id='headlineExpander${n}' style='cursor: pointer'>
                                    <b>${alertEvent}<br>${alertSenderName}</b>
                                </div>
                                <div id='alertBody${n}'>
                                    <br><b>Send Time: </b>${printFancyTime(alertSentTime)}
                                    <br><b>Effective Time: </b>${printFancyTime(alertEffectiveTime)}
                                    <br><b>Onset Time: </b>${printFancyTime(alertOnsetTime)}
                                    <br><b>Expires Time: </b>${printFancyTime(alertExpiresTime)}
                                    <br><b>Ends Time: </b>${printFancyTime(alertEndsTime)}
                                    <br><br><b><i>${alertSeverity}</i></b>, <b><i>${alertUrgency}</i></b><br><br>
                                    <b>WMO Identifier:</b> ${alertWMOidenifier}<br>
                                    <b>VTEC:</b> ${alertVTEC}<br>
                                    <b>NWS Headline:</b> ${alertNWSheadline}<br>
                                    <b>ID:</b> ${alertID}<br><br>
                                    <b>Headline:</b> ${alertHeadline}<br>
                                    <b>Description:</b> ${alertDescription}<br>
                                    <b>Instructions:</b> ${alertInstruction}
                                </div>
                            </div>`;
                            var popup = new mapboxgl.Popup()
                            .setLngLat(e.lngLat)
                            .setHTML(alertPopupContent)
                            .addTo(map);
                        });
                    }
                }
            })
        }

        var markerArr = [];
        function stationMarkers() {
            $.getJSON('/weather/json/wdg_radar-stations_05042022.json', function(data) {
                for (let n = 0; n < 208; n++) {
                    var radarStation = data.features[n].properties.id;
                    var latt = data.features[n].geometry.coordinates[1];
                    var lonn = data.features[n].geometry.coordinates[0];
                    var stationType = data.features[n].properties.stationType;
                    
                    if (stationType == "WSR-88D") {
                        //L.marker([latt, lonn], {icon: radarIcon}).addTo(markerLayerGroup)
                        //L.marker([latt, lonn]).addTo(markerLayerGroup)
                        //    .bindPopup(radarStation);

                        var initMarker = new mapboxgl.Marker({
                            color: "#4287f5",
                        }).setLngLat([lonn, latt])
                            .setPopup(new mapboxgl.Popup().setHTML("<div><b><div style='cursor: pointer' id='radarStationDiv' onclick='getStation()'>" + radarStation + "</div></b><i>Still loading station data...</i></div>"))
                            .addTo(map)
                        markerArr.push(initMarker)
                    }
                }
                $.getJSON('https://api.weather.gov/radar/stations', function(data) {
                    //map.removeLayerGroup('markerLayerGroup')
                    for (var u = 0; u < markerArr.length; u++) {
                        markerArr[u].remove();
                    }
                    markerArr = []
                    for (let n = 0; n < 208; n++) {
                        var radarStation = data.features[n].properties.id;
                        var latt = data.features[n].geometry.coordinates[1];
                        var lonn = data.features[n].geometry.coordinates[0];
                        var stationType = data.features[n].properties.stationType;

                        var radstatLastReceivedData = new Date(data.features[n].properties.latency.levelTwoLastReceivedTime);
                        var currentTimeForStatus = new Date();
                        var timeDiff = currentTimeForStatus - radstatLastReceivedData;
                        var formattedLastReceivedData = printFancyTime(radstatLastReceivedData);
                        
                        if (stationType == "WSR-88D") {
                            //L.marker([latt, lonn], {icon: radarIcon}).addTo(markerLayerGroup)
                            //L.marker([latt, lonn]).addTo(markerLayerGroup)
                            //    .bindPopup(radarStation);

                            if (timeDiff >= 900000) {
                                //$('body').append
                                var isRadarDown = true;
                                var down = new mapboxgl.Marker({
                                    color: "#fc0303",
                                }).setLngLat([lonn, latt])
                                    .setPopup(new mapboxgl.Popup().setHTML("<div><b><div style='cursor: pointer' id='downRadarStation' onclick='getDownStation()'>" + radarStation + "</div></b><div style='color: rgb(226, 0, 0)'>OFFLINE</div><div>" + formattedLastReceivedData + "</div></div>"))
                                    .addTo(map)
                                markerArr.push(down)
                            } else if (timeDiff < 900000) {
                                //$('body').append
                                var isRadarDown = false;
                                var up = new mapboxgl.Marker({
                                    color: "#1bb50d",
                                }).setLngLat([lonn, latt])
                                    .setPopup(new mapboxgl.Popup().setHTML("<div><b><div style='cursor: pointer' id='upRadarStation' onclick='getUpStation()'>" + radarStation + "</div></b><div style='color: rgb(16, 160, 10)'>ONLINE</div><div>" + formattedLastReceivedData + "</div></div>"))
                                    .addTo(map)
                                markerArr.push(up)
                            }
                        }
                    }
                })
            })
        }

        // Control implemented as ES6 class
        class stationControl {
            onAdd(map) {
                this._map = map;
                this._container = document.createElement('div');
                this._container.className = 'mapboxgl-ctrl-fullscreen';
                this._container.innerHTML = `
                    <div class="mapboxgl-control-container">

                                </button>
                            </div>
                        </div>
                    </div>`
                this._container.addEventListener('click', function() {
                    if (!$('#stationThing').hasClass('icon-selected')) {
                        $('#stationThing').addClass('icon-selected');
                        $('#stationThing').removeClass('icon-black');
                        stationMarkers();
                    } else if ($('#stationThing').hasClass('icon-selected')) {
                        $('#stationThing').removeClass('icon-selected');
                        $('#stationThing').addClass('icon-black');
                        for (var u = 0; u < markerArr.length; u++) {
                            markerArr[u].remove();
                        }
                    }
                })
                return this._container;
            }

        class pausePlayControl {
            onAdd(map) {
                this._map = map;
                this._container = document.createElement('div');
                this._container.className = 'mapboxgl-ctrl-fullscreen';
                this._container.innerHTML = `

                        </div>
                    </div>`
                this._container.addEventListener('click', function() {
                    if ($('#pausePlayThing').hasClass('fa-play')) {
                        $('#pausePlayThing').removeClass('fa-play');
                        $('#pausePlayThing').removeClass('green-icon');

                        $('#pausePlayThing').addClass('fa-pause');
                        $('#pausePlayThing').addClass('red-icon');
                        var i = 0;
                        function myLoop() {
                            var radarLoopTimeout = setTimeout(function() {
                                //for (var q = 0; q < iterations.length; q++) {
                                //    map.removeLayer(`wms-test-layer${q}`)
                                //    map.removeSource(`wms-test-layer${q}`)
                                //}
                                console.log(`wms-test-layer${i}`)
                                setNexradLayerOpacity(i, 1)
                                var displayedRadarTime = new Date(currentTime - minutesToSubtract[i] * msPerMinute);
                                document.getElementById('timestampDisplay').innerHTML = printFancyTime(displayedRadarTime)
                                i++;
                                if (!$('#pausePlayThing').hasClass('fa-play')) {
                                    if (i < nexradTimestamps.length) {
                                        myLoop();
                                    } else if (i == nexradTimestamps.length) {
                                        i = 0;
                                        myLoop();
                                    }
                                } else {
                                    clearTimeout(radarLoopTimeout)
                                }
                            }, 700)
                        }
                        myLoop();
                    } else if (!$('#pausePlayThing').hasClass('fa-play')) {
                        $('#pausePlayThing').removeClass('fa-pause');
                        $('#pausePlayThing').removeClass('red-icon');

                        $('#pausePlayThing').addClass('fa-play');
                        $('#pausePlayThing').addClass('green-icon');
                    }
                })
                return this._container;
            }

            onRemove() {
                this._container.parentNode.removeChild(this._container);
                this._map = undefined;
            }
        }

    function setView(lat, lng, zoom) {
        map.setCenter([lng, lat]);
        map.setZoom(zoom);
        if (map.getLayer('rpv')) {
            map.removeLayer('rpv')
        }
        if (map.getSource('rpv')) {
            map.removeSource('rpv')
        }
        $('#rpvThing').removeClass('icon-selected');
        $('#rpvThing').addClass('icon-black');
    }
    function setFromStation(stat, zoo) {
        $.getJSON('/weather/json/radarStations.json', function(data) {
            var theLat = data[stat][1]
            var theLng = data[stat][2]
            console.log(theLat, theLng)
            setView(theLat, theLng, zoo)
            document.getElementById('stationDisplay').innerHTML = stat.toUpperCase();
            var radstat = stat.toUpperCase();

            var radstatURL = `https://api.weather.gov/radar/stations/${radstat}`;
            $.getJSON(radstatURL, function(data) {

                var radstatLastReceivedData = new Date(data.properties.latency.levelTwoLastReceivedTime);
                var currentTime = new Date();
                var timeDiff = currentTime - radstatLastReceivedData;

                var radstatELEM = document.getElementById('radstat');
                // if it has been 15 minutes (900000 ms) since last radar data, radar is down
                if (timeDiff >= 900000) {
                    var isRadarDown = true;
                    radstatELEM.style.color = 'rgb(226, 0, 0)';
                    document.getElementById('radstat').innerHTML = "OFFLINE";
                } else if (timeDiff < 900000) {
                    var isRadarDown = false;
                    radstatELEM.style.color = 'rgb(16, 160, 10)';
                    document.getElementById('radstat').innerHTML = "ONLINE";
                }

                document.getElementById('radstatStation').innerHTML = radstat;
                document.getElementById('radstatName').innerHTML = data.properties.name;
                document.getElementById('radstatLastData').innerHTML = printFancyTime(radstatLastReceivedData);


                var radmessageURL = `https://api.weather.gov/products/types/FTM/locations/${radstat.substring(1)}`;
                $.getJSON(radmessageURL, function(data) {

                    // THIS CODE IS TO REPLACE THE @ CHARACTERS WITH "AT"
                    // @ json to string
                    var stringjson = JSON.stringify(data);
                    // replace @ with AT
                    var stringjsonwithoutat = stringjson.replace(/@/g, 'AT');
                    // re-parse the AT json
                    var PARSEDstringjsonwithoutat = JSON.parse(stringjsonwithoutat);

                    var emptyJsonString = '{"ATcontext":{"ATversion":"1.1"},"ATgraph":[]}';

                    if (JSON.stringify(PARSEDstringjsonwithoutat) === emptyJsonString) {
                        console.log("has no message");
                        document.getElementById('radstatMessage').innerHTML = "No active message for this radar station.";
                        document.getElementById('radstatMessageID').innerHTML = "None";
                        document.getElementById('radstatMessageName').innerHTML = "None";
                        document.getElementById('radstatMessageTime').innerHTML = "None";
                    } else {
                        console.log("has message");
                        var msgURL = PARSEDstringjsonwithoutat.ATgraph[0].ATid;
                        $.getJSON(msgURL, function(data) {
                            var radstatMessageIssuanceTime = new Date(data.issuanceTime);
                            var radstatMessageText = data.productText;

                            // extract the text in between the \n\n sequences -
                            // that text is all we need
                            var middle = radstatMessageText.slice(
                                radstatMessageText.indexOf('\n\n') + 1,
                                radstatMessageText.lastIndexOf('\n\n'),
                            );

                            radstatMessageText.replace(/\n/g, '<br>');

                            document.getElementById('radstatMessageID').innerHTML = `${data.id}<br><div class='false-anchor' onclick='window.location.href = "${msgURL}"'>${msgURL}</a>`;
                            document.getElementById('radstatMessageName').innerHTML = data.productName;
                            document.getElementById('radstatMessage').innerHTML = radstatMessageText;
                            document.getElementById('radstatMessageTime').innerHTML = printFancyTime(radstatMessageIssuanceTime);

                            console.log(radstatMessageText);
                        });
                    }
                });
            });
        })
        if (document.getElementById('stationDisplay').innerHTML == '') {
            map.addControl(new messageControl);
        }
    }
