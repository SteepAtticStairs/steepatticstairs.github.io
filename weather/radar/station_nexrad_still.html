<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.6.0/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.6.0/leaflet.js"></script>
    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>

    <style>
        #map {
            width: 500px;
            height: 500px;
            position: absolute;
            z-index: 500;
            text-align: center;
            left: 50%;
            border-style: solid;
            border-width: 2px;
            border-color: black;
            border-radius: 50%;
            margin-left: -250px; /* Half of the width */
        }
    </style>
</head>
<body>
    <div id="weathermap"></div>

    <div style="float: left">
        <form>
            <b><label for="radstatzipList">Input Radar Station:</b> (e.g. <a href="/weather/radar/station_nexrad_animated.html">KLWX</a>)</label>
            <br>
            <input name="radstatzipList" id="radstatzipList">
            <br>
            <button id="radstatzipSubmit">Ok</button>
        </form>
        <div><b>Zip: <a id="radstatzip"></a></b></div>
        <div><b>Coords: </b><a id="radstatcoords"></a></div>
        <div><b>Timestamp: </b><a id="ts"></a></div>
    </div>

    <div style="float: right">
        <a>Opacity</a>
        <br>
        <input id="opacitySlider" type="range" min="0" max="1" step="0.1" value="1">
        <br>
        <a>Zoom</a>
        <br>
        <input id="zoomSlider" type="range" min="5" max="20" step="1" value="7">
    </div>

    <script>
        function setView(lat, lon, zoom, opac) {
            var oopaac;
            document.getElementById('weathermap').innerHTML = "<div id='map' style='top: 135px;'></div>";
            
            var map = 
            L.map('map',{
                attributionControl: false, // Disable the autogenerated attribution 
            }).setView([lat, lon], zoom);

            var osmLayer = 
            L.tileLayer('https://{s}.tile.osm.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://osm.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            //var nexradLayer = 
            //L.tileLayer.wms("https://mesonet.agron.iastate.edu/cgi-bin/wms/nexrad/n0q.cgi", {
            //    layers: 'nexrad-n0q-900913',
            //    format: 'image/png',
            //    transparent: true,
            //    attribution: "Weather data © 2012 IEM Nexrad"
            //}).addTo(map);

            var timeStampe = 
            ['-m05m', '-m10m', '-m15m', '-m20m', '-m25m', '-m30m', '-m35m', '-m40m', '-m45m', '-m50m'];
            timeStampe.reverse();
            var radarLayers = [];
            for(let i = 0; i <= 11; i++){
                if (i < 11) {
                    var layer = 'nexrad-n0q-900913' + timeStampe[i];
                    radarLayers[i] = L.tileLayer.wms("https://mesonet.agron.iastate.edu/cgi-bin/wms/nexrad/n0q.cgi", {
                        layers: layer,
                        format: 'image/png',
                        transparent: true,
                        opacity: 0.0,
                    });
                    //console.log(layer);
                    radarLayers[i].addTo(map);
                }
                if (i == 11) {
                    var layer = 'nexrad-n0q-900913'
                    radarLayers[11] = L.tileLayer.wms("https://mesonet.agron.iastate.edu/cgi-bin/wms/nexrad/n0q.cgi", {
                    layers: layer,
                    format: 'image/png',
                    transparent: true,
                    opacity: 0.0,
                });
                //console.log(layer);
                radarLayers[i].addTo(map);
                }
            }

            var i = 0;                     //  set your counter to 1

            function myLoop () {           //  create a loop function
            setTimeout(function () {    //  call a 3s setTimeout when the loop is called
                    radarLayers.map(function(layer){ layer.setOpacity(0)});
                    document.getElementById('ts').innerHTML = timeStampe[i];
                    radarLayers[i].setOpacity(oopaac);
                    console.log(i);
                    i++;                 //  increment the counter
                    if (i < 10) {            //  if the counter < 10, call the loop function
                        myLoop();             //  ..  again which will trigger another 
                    } else {
                        i = 0;
                        myLoop();
                    }                      //  ..  setTimeout()
                }, 500)
                return i;
            }
            myLoop();

            $('#zoomSlider').val(zoom);
            //nexradLayer.setOpacity(opac);
            //$('#opacitySlider').val(opac);
            oopaac = 1;
            $('#opacitySlider').val(oopaac);
//
            var opacitySlider = document.querySelector("#opacitySlider");
            opacitySlider.addEventListener("input", function() {
                oopaac = this.value;
            });
//
            var zoomSlider = document.querySelector("#zoomSlider");
            zoomSlider.addEventListener("input", function() {
                map.setZoom(this.value);
                setTimeout(() => { map.setZoom(this.value) }, "200")
                //map.setZoom(this.value);
            });
        }

        // code to get the zip code from a radar station
        var radstatzipSubmitBtn = document.getElementById('radstatzipSubmit');
        radstatzipSubmitBtn.addEventListener('click', function handleClick() {
            event.preventDefault();

            var radstat = document.querySelector('[name="radstatzipList"]').value;
            radstat = radstat.toUpperCase();
            $.getJSON('/weather/json/radarStations.json', function(data) {
                var zippy = data[radstat][0];
                var lati = data[radstat][1];
                var longi = data[radstat][2];

                //console.log(radstat + ": " + lati + ", " + longi);
                document.getElementById('radstatcoords').innerHTML = radstat + ": " + lati + ", " + longi;
                document.getElementById('radstatzip').innerHTML = zippy;
                setView(lati, longi, 7, 1);
            });
        });
    </script>
</body>
</html>
