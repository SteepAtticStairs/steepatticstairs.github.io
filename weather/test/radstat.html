    <script>
        var myObj = [];
        var myObj2 = {}
        var zipArray = [];
        $.getJSON('/weather/json/allStations.json', function(data) {
            var allOfStats = data;

            $.getJSON('/weather/json/radarStations.json', function(data) {
                var allOfCoords = data;

                for (i = 0; i < 208; i++) {
                    var currentStat = allOfStats[i];
                    var lati = allOfCoords[currentStat][0];
                    var longi = allOfCoords[currentStat][1];
                    //document.write(lati + ", " + longi);

                    getZip(lati, longi, currentStat);
                }

                function getZip(latt, longg, st) {
                    var url = `https://circumvent-cors.herokuapp.com/http://api.geonames.org/findNearbyPostalCodesJSON?lat=${latt}&lng=${longg}&username=pufferfishe`;
                    $.getJSON(url, function(data) {
                        var zippy = data.postalCodes[0].postalCode;
                        //console.log(zipArray);
                        myObj2[st] = [zippy, lati, longi];

                        console.log(myObj2);
                    });
                }
            });
        });
    </script>
