<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Data</title>
    <link rel="stylesheet" href="/dump/98css/98.css" />
    <style type="text/css">
        :root {
            --fontsize: 13px
        }
        body, html
        {
            margin: 0; padding: 0; height: 100%;
        }
        img{
            max-width: 100%;
            max-height: 100%;
            display: block; /* remove extra space below image */
        }
        #content
        {
            left: 0; right: 0; bottom: 0; top: 0px; font-size: var(--fontsize);
        }
        #form
        {
            font-size: var(--fontsize)
        }
        #submitbutton
        {
            background-color:#929292;
            font-size: var(--fontsize)
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script>
        var OWMkey = "dbf262da490678e53bec10704ce4032d";
        var ACCWkey = "e7Gh3WOFT6hArk2UVeShGQUi4iDZaenk";

        // converts kelvin to fahrenheit, then rounds to one decimal
        function KtoF (value) {
            var outValue = 0;
            outValue = ((value-273.15)*1.8)+32;
            roundOutValue = (Math.round(outValue * 10) / 10);
            return roundOutValue;
        }

        // get direction from wind angle
        function getCardinal(angle) {
            /** 
             * Customize by changing the number of directions you have
             * We have 8
             */
            const degreePerDirection = 360 / 8;
        
            /** 
             * Offset the angle by half of the degrees per direction
             * Example: in 4 direction system North (320-45) becomes (0-90)
             */
            const offsetAngle = angle + degreePerDirection / 2;
        
            return (offsetAngle >= 0 * degreePerDirection && offsetAngle < 1 * degreePerDirection) ? "N"
              : (offsetAngle >= 1 * degreePerDirection && offsetAngle < 2 * degreePerDirection) ? "NE"
                : (offsetAngle >= 2 * degreePerDirection && offsetAngle < 3 * degreePerDirection) ? "E"
                  : (offsetAngle >= 3 * degreePerDirection && offsetAngle < 4 * degreePerDirection) ? "SE"
                    : (offsetAngle >= 4 * degreePerDirection && offsetAngle < 5 * degreePerDirection) ? "S"
                      : (offsetAngle >= 5 * degreePerDirection && offsetAngle < 6 * degreePerDirection) ? "SW"
                        : (offsetAngle >= 6 * degreePerDirection && offsetAngle < 7 * degreePerDirection) ? "W"
                            : "NW";
        }

        // if the div contents are shown, hide them
        function hideGeoUrl() {
            var GeoUrl = document.getElementById("geourl");
            if (GeoUrl.style.display === "none") {
                GeoUrl.style.display = "block";
            } else {
                GeoUrl.style.display = "none";
            }
        }

        // if the div contents are shown, hide them
        function hideLocatorUrl() {
            var LocUrl = document.getElementById("locurl");
            if (LocUrl.style.display === "none") {
                LocUrl.style.display = "block";
            } else {
                LocUrl.style.display = "none";
            }
        }

        // if the div contents are shown, hide them
        function hideDataUrl() {
            var DataUrl = document.getElementById("dataurl");
            if (DataUrl.style.display === "none") {
                DataUrl.style.display = "block";
            } else {
                DataUrl.style.display = "none";
            }
        }

        // reset the text in all of the divs
        function resetAllDivs () {
            document.getElementById("replacezip").innerHTML = " ";
            document.getElementById("replacecity").innerHTML = " ";
            document.getElementById("replaceziplat").innerHTML = " ";
            document.getElementById("replaceziplon").innerHTML = " ";
            document.getElementById("geourl").innerHTML = " ";
            document.getElementById("locurl").innerHTML = " ";
            document.getElementById("dataurl").innerHTML = " ";

            // if the showURL buttons have already been clicked, hide them
            // so that another click won't show them again
            var GeoUrl2 = document.getElementById("geourl");
            if (GeoUrl2.style.display === "none") {
                GeoUrl2.style.display = "block";
            }
            var LocUrl2 = document.getElementById("locurl");
            if (LocUrl2.style.display === "none") {
                LocUrl2.style.display = "block";
            }
            var DataUrl2 = document.getElementById("dataurl");
            if (DataUrl2.style.display === "none") {
                DataUrl2.style.display = "block";
            }
        }
    </script>
</head>

<body>
    <div class="window" id="content">
        <div class="title-bar">
            <div class="title-bar-text">Exploring - ACCW Current Weather</div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
            </div>
        </div>
        <div class="window-body">
            <button onclick="window.location.href = '/weather/datasources/owm/current.html'"><b><u>B</u>ack</b></button>
    <p>
        <form>
            <label id="form" for="zipcode">Zip Code:</label><br>
            <input id="form" type="text" id="zipcode" name="zipcode" autofocus><br>
            <br>
            <button id="submitbutton" type="submit">Ok</button>
        </form>
        <br>
    </p>

<div>
    <br>
    <div><b>Zip Code: </b><a id="replacezip"></a></div>
    <div><b>City Name: </b><a id="replacecity"></a></div>
    <br>
    <div><b>Latitude: </b><a id="replaceziplat"></a></div>
    <div><b>Longitude: </b><a id="replaceziplon"></a></div>
    <br>
    <button id="buttongeo" onclick="hideGeoUrl()">Show OWM Geolocator URL</button>
    <div><b>OWM Geolocator URL: </b><a id="geourl"></a></div>
    <button id="buttonlocator" onclick="hideLocatorUrl()">Show ACCW Location Key URL</button>
    <div><b>ACCW Location Key URL: </b><a id="locurl"></a></div>
    <button id="buttondata" onclick="hideDataUrl()">Show ACCW Main Weather Data URL</button>
    <div><b>ACCW Main Weather Data URL: </b><a id="dataurl"></a></div>
    <br>
    <br>
    <br>
    <div><b>Time: <a id="time"></a></b></div>
    <div><b>Temperature: </b><a id="temp"></a></div>
    <div><b>Feels Like: </b><a id="feelslike"></a></div>
    <br>
</div>

    <script type="text/javascript">
        // Listen for the "submit" event on the form
        document.querySelector('form').addEventListener('submit', event => {

        // reset all div elements to their original state
        resetAllDivs();
        // click the buttons to hide the urls
        $("#buttongeo").click()
        $("#buttondata").click()
        $("#buttonlocator").click()
        
        // Stop the form from refreshing the page
        event.preventDefault()

        // Get the zip code from the input
        const zipCodeOutput = document.querySelector('[name="zipcode"]').value
        
        document.getElementById("replacezip").innerHTML = zipCodeOutput;

        /*
        *  Gets the latitude and longitude from the inputted zip code
        */
        var geoUrl = `https://api.openweathermap.org/geo/1.0/zip?zip=${zipCodeOutput},US&units=imperial&appid=${OWMkey}`;
        $.getJSON(geoUrl, function(data) {

            var cityname = data.name;
            var ziplat = data.lat;
            var ziplon = data.lon;
    
            document.getElementById('replacecity').innerHTML = cityname;

            document.getElementById('replaceziplat').innerHTML = ziplat;
            document.getElementById('replaceziplon').innerHTML = ziplon;

            document.getElementById('geourl').innerHTML = geoUrl;

            /*
            *  Gets all of the weather information
            */
            var getLocationUrl = `https://dataservice.accuweather.com/locations/v1/cities/geoposition/search?apikey=${ACCWkey}&q=${ziplat},${ziplon}`;
            document.getElementById('locurl').innerHTML = getLocationUrl;
            
            $.getJSON(getLocationUrl, function(data) {

                var locKey = data.Key;

                var dataUrl = `https://dataservice.accuweather.com/currentconditions/v1/${locKey}?apikey=${ACCWkey}&details=true`
                document.getElementById('dataurl').innerHTML = dataUrl;

                $.getJSON(dataUrl, function(data) {
                
                var timeStamp = data[0].EpochTime;
                
                // prints all of the values to the html document
                document.getElementById('time').innerHTML = new Date(timeStamp * 1000).toLocaleDateString() + " " + new Date(timeStamp * 1000).toLocaleTimeString();
                document.getElementById('temp').innerHTML = data[0].Temperature.Imperial.Value + "℉";
                document.getElementById('feelslike').innerHTML = data[0].RealFeelTemperature.Imperial.Value + "℉";
                });
            });
        });
        })
    </script>
</div>
</div>
</body>
</html>
